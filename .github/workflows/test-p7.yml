name: Run Tests (p7 - same container)

on:
  push:
    branches: [ main, develop ]
    paths: [ "p7/**", ".github/workflows/test-p7.yml" ]
  pull_request:
    branches: [ main, develop ]
    paths: [ "p7/**", ".github/workflows/test-p7.yml" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare .env
        working-directory: p7
        run: |
          cp .env.dist .env
          # newline safe
          printf "\nAPI_TOKEN=%s\nMISTRAL_TOKEN=%s\n" "${{ secrets.API_TOKEN }}" "${{ secrets.MISTRAL_TOKEN }}" >> .env

      - name: Ensure INDEX_DIR exists
        working-directory: p7
        run: |
          set -e
          dir="$(grep '^INDEX_DIR=' .env | cut -d= -f2-)"
          echo "Creating $dir"
          mkdir -p "$dir"
          ls -la "$dir"

      - name: Build image
        working-directory: p7
        run: docker compose build api

      - name: Start API (uses CMD uvicorn)
        working-directory: p7
        run: docker compose up -d api

      - name: Show API initial logs and status
        working-directory: p7
        run: |
          echo "---- docker compose ps ----"
          docker compose ps
          echo "---- initial api logs (tail 300) ----"
          docker compose logs --no-color --tail=300 api || true

      - name: Wait until API is ready
        working-directory: p7
        run: |
          for i in $(seq 1 45); do
            if docker compose exec -T api sh -lc "curl -fsS http://127.0.0.1:80/health >/dev/null 2>&1 || curl -fsS http://127.0.0.1:80/test-auth >/dev/null 2>&1 || curl -fsS http://127.0.0.1:80/ >/dev/null 2>&1"; then
              echo "API is up"
              break
            fi
            echo "Waiting API ($i)..."
            sleep 2
          done

      - name: Run pytest inside running api container
        working-directory: p7
        run: docker compose exec -T api pytest ./tests -v

      - name: Cleanup
        if: always()
        working-directory: p7
        run: docker compose down
name: Run Tests (p7)

on:
  push:
    branches: [ main, develop ]
    paths:
      - "p7/**"
      - ".github/workflows/test-p7.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "p7/**"
      - ".github/workflows/test-p7.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from .env.dist
        working-directory: p7
        run: |
          cp .env.dist .env
          {
            echo "API_TOKEN=${{ secrets.API_TOKEN }}"
            echo "MISTRAL_TOKEN=${{ secrets.MISTRAL_TOKEN }}"
          } >> .env

      - name: Build and run tests (docker compose in p7/)
        working-directory: p7
        run: |
          docker compose build api
          docker compose run --rm api pytest ./tests -v

      - name: Cleanup
        if: always()
        working-directory: p7
        run: docker compose down
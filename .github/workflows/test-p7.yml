name: Run Tests (p7 - same container)

on:
  push:
    branches: [ main, develop ]
    paths: [ "p7/**", ".github/workflows/test-p7.yml" ]
  pull_request:
    branches: [ main, develop ]
    paths: [ "p7/**", ".github/workflows/test-p7.yml" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare .env
        working-directory: p7
        run: |
          cp .env.dist .env
          # newline safe
          printf "\nAPI_TOKEN=%s\nMISTRAL_TOKEN=%s\n" "${{ secrets.API_TOKEN }}" "${{ secrets.MISTRAL_TOKEN }}" >> .env

      - name: Build image
        working-directory: p7
        run: docker compose build api

      - name: Run pytest inside api container
        working-directory: p7
        run: docker compose run --rm api pytest ./tests -v

      - name: Cleanup
        if: always()
        working-directory: p7
        run: docker compose down
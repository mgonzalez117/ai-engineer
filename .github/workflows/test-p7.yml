name: Run Tests (p7)

on:
  push:
    branches: [ main, develop ]
    paths: [ "p7/**", ".github/workflows/test-p7.yml" ]
  pull_request:
    branches: [ main, develop ]
    paths: [ "p7/**", ".github/workflows/test-p7.yml" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare .env
        working-directory: p7
        run: |
          cp .env.dist .env
          # Ajoute une NL avant les secrets pour éviter les lignes collées
          printf "\nAPI_TOKEN=%s\nMISTRAL_TOKEN=%s\n" "${{ secrets.API_TOKEN }}" "${{ secrets.MISTRAL_TOKEN }}" >> .env

      - name: Ensure data dirs exist
        working-directory: p7
        run: |
          # Crée les dossiers ignorés par git que l'app attend
          mkdir -p .ragdata/index/faiss_var
          # Optionnel: valider que le prompt existe
          test -f prompts/answer_events.txt || { echo "Missing prompts/answer_events.txt"; exit 1; }

      - name: Build image (only if needed)
        working-directory: p7
        run: docker compose build api

      - name: Start API (uses CMD uvicorn)
        working-directory: p7
        run: docker compose up -d api

      - name: Wait until API responds (light check)
        working-directory: p7
        run: |
          for i in $(seq 1 45); do
            if docker compose exec -T api sh -lc 'curl -fsS http://127.0.0.1:80/docs >/dev/null 2>&1 || curl -fsS http://127.0.0.1:80/openapi.json >/dev/null 2>&1 || curl -fsS http://127.0.0.1:80/ >/dev/null 2>&1'; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting API ($i)..."
            sleep 2
          done
          echo "API did not become ready"
          docker compose logs api
          exit 1

      - name: Pre-build Faiss index (Python)
        working-directory: p7
        run: |
          docker compose exec -T api sh -lc "python - <<'PY'
            from src.data.build import build_index
            build_index()
            print('Index built successfully.')
            PY"

      - name: Run pytest inside running api container
        working-directory: p7
        run: docker compose exec -T api pytest ./tests -v

      - name: Cleanup
        if: always()
        working-directory: p7
        run: docker compose down
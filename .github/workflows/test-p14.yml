name: Run Tests (p14)

on:
  push:
    branches: [ main, develop ]
    paths:
      - "p14/**"
      - ".github/workflows/test-p14.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "p14/**"
      - ".github/workflows/test-p14.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: p14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi --no-root

      - name: Run tests
        run: poetry run pytest tests -v

  deploy_lora:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: p14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy dependency
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub wandb

      - name: Deploy LoRA to Hugging Face
        env:
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: python -m src.export.deploy_lora

  deploy_api_image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect API image changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            api_image:
              - 'p14/Dockerfile'
              - 'p14/src/api/**'
              - 'p14/pyproject.toml'
              - 'p14/poetry.lock'

      - name: Skip image build (no relevant changes)
        if: steps.changes.outputs.api_image != 'true'
        run: echo "No API image changes detected. Skipping build and push."

      - name: Validate Docker Hub secrets
        if: steps.changes.outputs.api_image == 'true'
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Missing secret: DOCKERHUB_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing secret: DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Setup Docker Buildx
        if: steps.changes.outputs.api_image == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changes.outputs.api_image == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push p14-api image
        if: steps.changes.outputs.api_image == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./p14
          file: ./p14/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/p14-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/p14-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Runpod deployment config
        if: steps.changes.outputs.api_image == 'true'
        run: |
          if [ -z "${{ secrets.RUNPOD_API_KEY }}" ]; then
            echo "Missing secret: RUNPOD_API_KEY"
            exit 1
          fi
          if [ -z "${{ vars.RUNPOD_API_POD_ID }}" ]; then
            echo "Missing variable: RUNPOD_API_POD_ID"
            exit 1
          fi

      - name: Update Runpod API pod image
        if: steps.changes.outputs.api_image == 'true'
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_API_POD_ID: ${{ vars.RUNPOD_API_POD_ID }}
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/p14-api:sha-${{ github.sha }}
        run: |
          curl --fail --show-error --silent \
            -X POST "https://rest.runpod.io/v1/pods/${RUNPOD_API_POD_ID}/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\":\"${IMAGE_NAME}\"}"
          echo "Runpod pod updated to image: ${IMAGE_NAME}"

  deploy_vllm_image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect vLLM image changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            vllm_image:
              - 'p14/docker/vllm/Dockerfile'
              - 'p14/docker/vllm/start.sh'

      - name: Skip vLLM image build (no relevant changes)
        if: steps.changes.outputs.vllm_image != 'true'
        run: echo "No vLLM image changes detected. Skipping build and push."

      - name: Validate Docker Hub token
        if: steps.changes.outputs.vllm_image == 'true'
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing secret: DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Setup Docker Buildx
        if: steps.changes.outputs.vllm_image == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changes.outputs.vllm_image == 'true'
        uses: docker/login-action@v3
        with:
          username: mgonzalez117
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push p14-vllm image
        if: steps.changes.outputs.vllm_image == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./p14
          file: ./p14/docker/vllm/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/p14-vllm:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/p14-vllm:sha-${{ github.sha }}
          cache-from: type=gha,scope=p14-vllm
          cache-to: type=gha,mode=max,scope=p14-vllm

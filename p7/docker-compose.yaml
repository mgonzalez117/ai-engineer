name: ai-engineer-p7
services:
  api:
    container_name: p7-api
    build: .
    volumes:
      - ./:/app
    ports:
      - "${API_PORT}:80"
    environment:
      API_URL: "http://127.0.0.1:80"
      API_TOKEN: ${API_TOKEN}
      OPENAGENDA_PATH: './assets/openagenda.csv'
      INDEX_DIR: .ragdata/index/faiss_var_2025
      EMB_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SOURCE: opendatasoft
      DEPARTMENT: Var
      YEAR: 2025
    stdin_open: true
    tty: true
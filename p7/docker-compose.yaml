name: ai-engineer-p7
services:
  api:
    container_name: p7-api
    build: .
    volumes:
      - ./:/app
    ports:
      - '${API_PORT}:80'
    environment:
      API_URL: 'http://127.0.0.1:80'
      API_TOKEN: ${API_TOKEN}
      INDEX_DIR: .ragdata/index/faiss_var_2025
      EMB_MODEL: sentence-transformers/all-MiniLM-L6-v2
      OPENDATASOFT_URL: 'https://public.opendatasoft.com/api/records/1.0/search/'
      OPENDATASOFT_DATASET: 'evenements-publics-openagenda'
      FILTER_DEPARTMENT: Var
      FILTER_YEAR: 2025
    stdin_open: true
    tty: true
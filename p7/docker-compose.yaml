name: ai-engineer-p7
services:
  api:
    container_name: p7-api
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
    volumes:
      - ./:/app
    ports:
      - "${API_PORT}:80"
    environment:
      API_URL: "http://127.0.0.1:80"
      API_TOKEN: ${API_TOKEN}
    stdin_open: true
    tty: true
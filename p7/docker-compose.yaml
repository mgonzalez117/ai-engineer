name: ai-engineer-p7
services:
  api:
    container_name: p7-api
    build: .
    volumes:
      - ./:/app
    ports:
      - '${API_PORT}:80'
    environment:
      PYTHONPATH: /app
      API_URL: 'http://127.0.0.1:80'
      API_TOKEN: ${API_TOKEN}
      INDEX_DIR: ${INDEX_DIR}
      OPENDATASOFT_URL: ${OPENDATASOFT_URL}
      OPENDATASOFT_DATASET: ${OPENDATASOFT_DATASET}
      FILTER_DEPARTMENT: ${FILTER_DEPARTMENT}
      FILTER_YEAR: ${FILTER_YEAR}
      MISTRAL_TOKEN: ${MISTRAL_TOKEN}
      MISTRAL_EMB_MODEL: ${MISTRAL_EMB_MODEL}
    stdin_open: true
    tty: true
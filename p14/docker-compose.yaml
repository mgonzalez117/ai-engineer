name: ai-engineer-p14
services:
  p14-api:
    container_name: p14-api
    build: .
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - DATA_DIR=.data
    command: poetry run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - p14_network

  p14-train:
    build:
      context: .
      dockerfile: docker/train/Dockerfile
    container_name: p14-train
    working_dir: /app
    volumes:
      - ./:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
      WANDB_API_KEY: ${WANDB_API_KEY}
    ipc: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    command: bash

networks:
  p14_network:
    driver: bridge

volumes:
  hf_cache:
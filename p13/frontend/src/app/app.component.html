<div class="page-scroll">
  <div class="page">
    <div class="board-area">
      <app-chessboard (fenChange)="onFenChange($event)"></app-chessboard>
    </div>

    <div class="sidebar-area">
      <app-agent-sidebar
        [fen]="currentFen"
        [loading]="loading"
        [error]="error"
        [suggestions]="agentResponse">
      </app-agent-sidebar>
    </div>
  </div>
</div>

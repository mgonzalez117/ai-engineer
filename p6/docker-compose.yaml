name: ai-engineer-p6
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./.mlflow/mlruns:/mlflow/mlruns
      - ./.mlflow/mlartifacts:/mlflow/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:///mlflow/mlruns
      --default-artifact-root file:///mlflow/mlartifacts

  python:
    container_name: python
    build: Dockerfile
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    stdin_open: true
    tty: true
    command: /bin/bash
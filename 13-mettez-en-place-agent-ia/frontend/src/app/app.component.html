<div class="page">
  <div class="main-column">
    <div class="board-area">
      <app-chessboard
        (fenChange)="onFenChange($event)"
        (dragFilterChange)="onDragFilterChange($event)">
      </app-chessboard>
    </div>

    <app-learning-panel
      [videos]="filteredAgentResponse?.videos || []"
      [context]="filteredAgentResponse?.context || []">
    </app-learning-panel>
  </div>

  <div class="sidebar-area">
    <app-agent-sidebar
      [fen]="currentFen"
      [loading]="loading"
      [error]="error"
      [suggestions]="filteredAgentResponse">
    </app-agent-sidebar>
  </div>
</div>

services:
  aiengineer-p2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiengineer-p2
    volumes:
      - .:/workspace
    ports:
      - "8888:8888"
    working_dir: /workspace
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    stdin_open: true
    tty: true
